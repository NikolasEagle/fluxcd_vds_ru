apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vless
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: vless
      version: ">=1.0.0"
      sourceRef:
        kind: HelmRepository
        name: vless-helm-repo
        namespace: flux-system
      interval: 1m
  valuesFrom:
    - kind: ConfigMap
      name: vless-config
      valuesKey: values.yaml
